services:
  - type: web
    name: ponnaloy-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:css
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: ponnaloy-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
